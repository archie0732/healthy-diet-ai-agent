<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diet Manager | AI Agent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .msg-ai {
        border-bottom-left-radius: 2px;
      }
      .msg-user {
        border-bottom-right-radius: 2px;
      }
      .image-zoom:hover {
        transform: scale(1.02);
        transition: transform 0.2s;
      }
    </style>
  </head>
  <body class="bg-slate-50 h-screen flex overflow-hidden">
    <aside
      class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 hidden md:flex flex-col p-6"
    >
      <div class="flex items-center gap-3 mb-8 text-white">
        <div class="bg-blue-600 p-2 rounded-lg">
          <i class="fas fa-robot text-xl"></i>
        </div>
        <h1 class="font-bold text-xl tracking-tight">Diet Manager</h1>
      </div>
      <div class="space-y-6 flex-grow">
        <div>
          <h3
            class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3"
          >
            Session Info
          </h3>
          <div class="bg-slate-800 rounded-md p-3 text-sm">
            <p class="text-slate-400">Thread ID:</p>
            <code class="text-blue-400">test_user_001</code>
          </div>
        </div>
        <div>
          <h3
            class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3"
          >
            Status
          </h3>
          <div class="flex items-center gap-2 text-sm">
            <span
              class="w-2 h-2 rounded-full bg-green-500 animate-pulse"
            ></span>
            <span>Local Model Connected</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-grow flex flex-col relative">
      <header
        class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8"
      >
        <div class="flex items-center gap-2">
          <span class="font-semibold text-slate-700">AI 營養專家</span>
          <span
            class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-medium"
            >Vision Mode</span
          >
        </div>
      </header>

      <section id="messages" class="flex-grow overflow-y-auto p-6 space-y-6">
        <div class="flex justify-center">
          <span
            class="text-xs bg-slate-200 text-slate-500 px-3 py-1 rounded-full"
            >與 Agent 的對話已加密</span
          >
        </div>
      </section>

      <div
        id="approval-panel"
        class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 w-full max-w-md px-4 z-20"
      >
        <div
          class="bg-amber-50 border border-amber-200 shadow-2xl rounded-xl p-4 flex items-center justify-between"
        >
          <div class="flex items-center gap-3 text-amber-800">
            <i class="fas fa-shield-halved text-xl"></i>
            <div>
              <p class="font-bold text-sm">操作審核</p>
              <p class="text-xs">Agent 請求寫入權限</p>
            </div>
          </div>
          <div class="flex gap-2">
            <button
              onclick="sendApproval('reject')"
              class="px-3 py-1.5 bg-white border border-amber-200 text-amber-700 text-sm rounded-lg hover:bg-amber-100 transition-colors"
            >
              拒絕
            </button>
            <button
              onclick="sendApproval('approve')"
              class="px-3 py-1.5 bg-amber-600 text-white text-sm rounded-lg hover:bg-amber-700 shadow-md transition-colors font-semibold"
            >
              授權執行
            </button>
          </div>
        </div>
      </div>

      <footer class="p-6 bg-white border-t border-slate-200">
        <div class="max-w-4xl mx-auto">
          <div
            class="relative flex items-center bg-slate-100 rounded-2xl p-1 shadow-inner focus-within:ring-2 focus-within:ring-blue-500 transition-all"
          >
            <input
              type="text"
              id="userInput"
              class="bg-transparent border-none w-full p-3 text-slate-700 placeholder-slate-400 outline-none"
              placeholder="在此輸入訊息或圖片路徑..."
              onkeypress="handleEnter(event)"
            />
            <button
              onclick="sendMessage()"
              class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-lg transition-all active:scale-95"
            >
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </footer>
    </main>

    <script>
      const threadId = "test_user_001";
      const msgDiv = document.getElementById("messages");
      const approvalPanel = document.getElementById("approval-panel");

      let currentAiMessageDiv = null;
      let thinkingBubble = null; // ⭐️ 新增：專屬思考氣泡

      function addMessage(text, sender) {
        const wrapper = document.createElement("div");
        wrapper.className = `flex ${sender === "user" ? "justify-end" : "justify-start"} w-full animate-in fade-in duration-300 mb-4`;

        const bubble = document.createElement("div");
        bubble.className = `max-w-[85%] p-4 rounded-2xl shadow-sm text-sm leading-relaxed ${
          sender === "user"
            ? "bg-blue-600 text-white msg-user"
            : "bg-white border border-slate-200 text-slate-700 msg-ai"
        }`;
        bubble.textContent = text;
        wrapper.appendChild(bubble);
        msgDiv.appendChild(wrapper);
        msgDiv.scrollTop = msgDiv.scrollHeight;
        return bubble;
      }

      // ⭐️ 核心優化：獨立的思考狀態 UI (像 Gemini 一樣)
      function showThinking(text) {
        // 如果不要顯示後端的囉嗦文字，可以過濾
        if (text.includes("自動放行安全工具")) return;

        if (!thinkingBubble) {
          // 如果還沒有氣泡，建一個新的
          const wrapper = document.createElement("div");
          wrapper.id = "thinking-wrapper";
          wrapper.className = "flex justify-start w-full mb-4 animate-pulse";
          wrapper.innerHTML = `
                    <span class="text-xs bg-slate-100 text-slate-500 px-4 py-2 rounded-full border border-slate-200 flex items-center gap-2 shadow-sm">
                        <i class="fas fa-circle-notch fa-spin text-blue-500"></i>
                        <span id="think-text">${text}</span>
                    </span>
                `;
          msgDiv.appendChild(wrapper);
          thinkingBubble = wrapper;
        } else {
          // 如果已經有了，只替換文字
          thinkingBubble.querySelector("#think-text").textContent = text;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
      }

      // ⭐️ 銷毀思考氣泡
      function removeThinking() {
        if (thinkingBubble) {
          thinkingBubble.remove();
          thinkingBubble = null;
        }
      }

      async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";
        approvalPanel.style.display = "none";

        // 發訊息時重置狀態
        removeThinking();
        currentAiMessageDiv = addMessage("", "ai");

        try {
          const response = await fetch("http://localhost:8001/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, thread_id: threadId }),
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split("\n\n");

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                try {
                  const data = JSON.parse(line.slice(6));

                  if (data.type === "text") {
                    // 當 AI 開始講話 (輸出白話文) 時，代表思考結束，銷毀旋轉氣泡！
                    removeThinking();
                    currentAiMessageDiv.textContent += data.content;
                  } else if (data.type === "status") {
                    showThinking(data.content);
                  } else if (data.type === "interrupt") {
                    removeThinking();
                    approvalPanel.style.display = "block";
                  } else if (data.type === "done") {
                    // 確保流程結束時氣泡一定會消失
                    removeThinking();
                  }
                } catch (e) {}
              }
            }
            msgDiv.scrollTop = msgDiv.scrollHeight;
          }
        } catch (error) {
          removeThinking();
          addMessage("連線失敗，請檢查 Server。", "ai");
        }
      }

      async function sendApproval(action) {
        approvalPanel.style.display = "none";
        showThinking(`系統執行: ${action}`);

        const res = await fetch("http://localhost:8001/api/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId, action }),
        });
        const data = await res.json();

        removeThinking();
        if (data.status === "approved") {
          currentAiMessageDiv.textContent += "\n\n" + data.result;
        }
      }

      function handleEnter(e) {
        if (e.key === "Enter") sendMessage();
      }
    </script>
  </body>
</html>
